description: |
  ESP loader represents a node capable of communicating with the target
  using a selected communication interface specified via devicetree.
  It uses a communication interface and two GPIOs to access the target SoC.
  The ESP loader is based on ESP Serial Flasher library.

compatible: "espressif,esp-loader"

include:
  - base.yaml

properties:
  uart:
    type: phandle
    required: true
    description: UART used for communication

  reset-gpios:
    type: phandle-array
    required: true
    description: Target reset GPIO

  boot-gpios:
    type: phandle-array
    required: true
    description: Target boot GPIO

  default-baudrate:
    type: int
    required: true

  higher-baudrate:
    type: int
    required: true

  num-trials:
    type: int
    required: true

  sync-timeout-ms:
    type: int
    required: true
